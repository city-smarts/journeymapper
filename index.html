function TimelineGenerator() {
  const [formData, setFormData] = useState({
    studentName: '',
    startDate: new Date().toISOString().split('T')[0],
    startingGrade: '11',
    cadence: 'high-touch',
    curriculum: 'standard', // standard, ap, or ib
    applicationSystems: {
      common_app: true,
      uc_system: false,
      ucas: false,
      oxbridge: false,
      canada: false
    },
    testPrepProvider: 'city-smarts',
    assessmentNeeded: true,
    assessmentTiming: 'asap',
    selectedTestSeasons: [],
    selectedTestDates: [],
    essaySupport: false,
    testing_plan: 'sat'
  });

  const [events, setEvents] = useState([]);
  const [editingEvent, setEditingEvent] = useState(null);
  const [showCustomEventForm, setShowCustomEventForm] = useState(false);
  const [showCSVText, setShowCSVText] = useState(false);
  const [customEvent, setCustomEvent] = useState({ date: '', title: '', category: 'Custom', notes: '' });

  // Helper to parse YYYY-MM-DD strings in local timezone (not UTC)
  const parseLocalDate = (dateStr) => {
    const [year, month, day] = dateStr.split('-').map(Number);
    return new Date(year, month - 1, day);
  };

  const updateFormData = (field, value) => {
    setFormData(prev => {
      const updated = { ...prev, [field]: value };
      
      // If changing starting grade or start date, validate assessment timing
      if (field === 'startingGrade' || field === 'startDate') {
        const grade = parseInt(field === 'startingGrade' ? value : prev.startingGrade);
        const startDate = new Date(field === 'startDate' ? value : prev.startDate);
        const startMonth = startDate.getMonth(); // 0-11
        
        // Check if current assessment timing is still valid
        const currentTiming = prev.assessmentTiming;
        let isValid = true;
        
        if (grade === 12 && currentTiming !== 'asap') {
          isValid = false;
        } else if (currentTiming === 'spring_10th') {
          // Only valid if grade < 10, OR grade 10 before March
          isValid = grade < 10 || (grade === 10 && startMonth < 2);
        } else if (currentTiming === 'summer_after_10th') {
          // Only valid if grade < 10, OR grade 10 before June
          isValid = grade < 10 || (grade === 10 && startMonth < 5);
        } else if (currentTiming === 'fall_11th') {
          // Only valid if grade < 11, OR grade 11 in Sept/Oct
          isValid = grade < 11 || (grade === 11 && startMonth >= 8 && startMonth < 10);
        } else if (currentTiming === 'spring_11th') {
          // Only valid if grade < 11, OR grade 11 before March
          isValid = grade < 11 || (grade === 11 && startMonth < 2);
        }
        
        // If invalid, reset to ASAP
        if (!isValid) {
          updated.assessmentTiming = 'asap';
        }
      }
      
      return updated;
    });
  };

  const updateApplicationSystem = (system, checked) => {
    setFormData(prev => ({
      ...prev,
      applicationSystems: { ...prev.applicationSystems, [system]: checked }
    }));
  };

  const toggleTestDate = (dateStr) => {
    setFormData(prev => ({
      ...prev,
      selectedTestDates: prev.selectedTestDates.includes(dateStr)
        ? prev.selectedTestDates.filter(d => d !== dateStr)
        : [...prev.selectedTestDates, dateStr]
    }));
  };

  const toggleTestSeason = (season) => {
    setFormData(prev => ({
      ...prev,
      selectedTestSeasons: prev.selectedTestSeasons.includes(season)
        ? prev.selectedTestSeasons.filter(s => s !== season)
        : [...prev.selectedTestSeasons, season]
    }));
  };

  // Get test dates organized by season relative to student's grade
  const getTestDatesBySeason = () => {
    // Calculate when the student will be in 11th and 12th grade
    const startGrade = parseInt(formData.startingGrade);
    const startDate = new Date(formData.startDate);
    const startYear = startDate.getFullYear();
    const startMonth = startDate.getMonth();
    
    // Calculate how many years until junior year
    const yearsUntilJunior = 11 - startGrade;
    const yearsUntilSenior = 12 - startGrade;
    
    // If starting in fall/spring, school year is current year, otherwise previous year
    const currentSchoolYear = startMonth >= 8 ? startYear : startYear - 1;
    
    const juniorSchoolYear = currentSchoolYear + yearsUntilJunior;
    const seniorSchoolYear = currentSchoolYear + yearsUntilSenior;
    
    const allDates = formData.testing_plan === 'sat' ? SAT_DATES : 
                     formData.testing_plan === 'act' ? ACT_DATES :
                     [...SAT_DATES, ...ACT_DATES];
    
    // When displaying "both", add test type to label
    const formatDateLabel = (testDate) => {
      if (formData.testing_plan === 'both') {
        const isSAT = SAT_DATES.find(d => d.date === testDate.date);
        const testType = isSAT ? 'SAT' : 'ACT';
        return { ...testDate, label: `${testDate.label} ${testType}` };
      }
      return testDate;
    };
    
    const seasons = {
      summer_before_junior: {
        label: 'Summer Before Junior Year',
        dates: allDates
          .filter(d => {
            const date = parseLocalDate(d.date);
            const year = date.getFullYear();
            const month = date.getMonth();
            return year === juniorSchoolYear && month >= 5 && month <= 7; // June-August (month 5=June)
          })
          .map(formatDateLabel)
      },
      fall_junior: {
        label: 'Fall of Junior Year',
        dates: allDates
          .filter(d => {
            const date = parseLocalDate(d.date);
            const year = date.getFullYear();
            const month = date.getMonth();
            // Sep-Dec of junior year school year, plus Jan-Feb of calendar year + 1
            return (year === juniorSchoolYear && month >= 8 && month <= 11) || 
                   (year === juniorSchoolYear + 1 && month >= 0 && month <= 1); // Jan-Feb
          })
          .map(formatDateLabel)
      },
      spring_junior: {
        label: 'Spring of Junior Year',
        dates: allDates
          .filter(d => {
            const date = parseLocalDate(d.date);
            const year = date.getFullYear();
            const month = date.getMonth();
            return year === juniorSchoolYear + 1 && month >= 2 && month <= 4; // Mar-May
          })
          .map(formatDateLabel)
      },
      summer_before_senior: {
        label: 'Summer Before Senior Year',
        dates: allDates
          .filter(d => {
            const date = parseLocalDate(d.date);
            const year = date.getFullYear();
            const month = date.getMonth();
            return year === seniorSchoolYear && month >= 5 && month <= 7; // June-August
          })
          .map(formatDateLabel)
      },
      fall_senior: {
        label: 'Fall of Senior Year',
        dates: allDates
          .filter(d => {
            const date = parseLocalDate(d.date);
            const year = date.getFullYear();
            const month = date.getMonth();
            return year === seniorSchoolYear && month >= 8 && month <= 11; // Sep-Dec
          })
          .map(formatDateLabel)
      }
    };
    
    return seasons;
  };

  const getSchoolYear = (date, grade) => {
    const d = new Date(date);
    const month = d.getMonth();
    const baseYear = d.getFullYear();
    
    // If before September, we're in the tail end of the previous school year
    const currentSchoolYear = month < 8 ? baseYear - 1 : baseYear;
    
    // Calculate the school year for the target grade
    const gradeNumber = parseInt(grade);
    const startGrade = parseInt(formData.startingGrade);
    const yearOffset = gradeNumber - startGrade;
    
    return currentSchoolYear + yearOffset;
  };

  const createEvent = (date, title, category, notes = '', fixed = true, tags = []) => ({
    id: Math.random().toString(36).substr(2, 9),
    date,
    title,
    category,
    notes,
    fixed,
    tags,
    editable: true
  });

  const addMonthsToDate = (dateStr, months) => {
    const date = new Date(dateStr);
    date.setMonth(date.getMonth() + months);
    return date.toISOString().split('T')[0];
  };

  const generateTimeline = () => {
    console.log('Starting timeline generation...');
    const newEvents = [];
    const startDate = new Date(formData.startDate);
    const startGrade = parseInt(formData.startingGrade);
    const startMonth = startDate.getMonth();
    const startYear = startDate.getFullYear();
    console.log('Start date:', startDate, 'Grade:', startGrade);

    // Add initial consultation at start date
    newEvents.push(createEvent(
      formData.startDate,
      'General Admissions Consultation',
      'Milestone',
      'Initial consultation and timeline planning',
      false,
      ['initial-consultation']
    ));

    // Helper to create date for a specific grade and month
    const createDateForGrade = (grade, month, day = 15) => {
      const schoolYear = getSchoolYear(formData.startDate, grade.toString());
      const year = month >= 8 ? schoolYear : schoolYear + 1;
      // Format directly as string to avoid timezone issues
      const m = (month + 1).toString().padStart(2, '0');
      const d = day.toString().padStart(2, '0');
      return `${year}-${m}-${d}`;
    };

    // Helper to check if we should include an event based on start date
    const shouldIncludeEvent = (eventGrade, eventMonth, eventDay = 15) => {
      // Never include events from grades before the starting grade
      if (eventGrade < startGrade) return false;
      
      // For events in future grades, always include
      if (eventGrade > startGrade) return true;
      
      // Same grade - check if event date is after start date
      const eventDateStr = createDateForGrade(eventGrade, eventMonth, eventDay);
      const eventDate = parseLocalDate(eventDateStr);
      return eventDate >= startDate;
    };

    // Helper to check if a date is during application season (Aug 1 of senior year onwards)
    const isApplicationSeason = (dateStr) => {
      const date = parseLocalDate(dateStr);
      const seniorYear = getSchoolYear(formData.startDate, '12');
      const appSeasonStart = new Date(seniorYear, 7, 1); // August 1 of senior year (month 7 = August)
      return date >= appSeasonStart;
    };

    // Fixed milestone meetings for each grade
    const fixedMilestones = [
      // 9th grade
      { grade: 9, month: 0, title: 'January Semester Check-in', category: 'Milestone' },
      { grade: 9, month: 5, title: 'End of Year Check-in', category: 'Milestone' },
      
      // 10th grade
      { grade: 10, month: 8, title: 'Beginning of Year Check-in', category: 'Milestone' },
      { grade: 10, month: 0, title: 'Mid-Year Check-in', category: 'Milestone' },
      { grade: 10, month: 5, title: 'End of Year Check-in', category: 'Milestone' },
      
      // 11th grade
      { grade: 11, month: 8, title: 'Beginning of Year Check-in', category: 'Milestone' },
      { grade: 11, month: 0, title: 'Mid-Year Check-in', category: 'Milestone', notes: 'Review semester 1 grades and plan spring college visits' },
      { grade: 11, month: 0, day: 20, title: 'College List Meeting', category: 'Milestone', notes: 'Develop initial college list' },
      { grade: 11, month: 2, title: 'College List Check', category: 'Milestone' },
      { grade: 11, month: 4, title: 'Request Teacher Recommendations', category: 'Milestone', notes: 'Ask teachers before end of school year' },
      { grade: 11, month: 5, title: 'End of Year Check-in', category: 'Milestone' },
      
      // 12th grade
      { grade: 12, month: 8, title: 'Schedule Alumni Interviews', category: 'Application', notes: 'Reach out to schools offering interviews' },
      { grade: 12, month: 9, title: 'Application Review', category: 'Milestone', notes: 'Review all applications before submission' },
      { grade: 12, month: 11, day: 10, title: 'RD Application Review', category: 'Milestone', notes: 'Final review of regular decision applications' },
      { grade: 12, month: 4, day: 1, title: 'College Decision Day', category: 'Deadline', notes: 'National commitment deadline - submit deposit' }
    ];

    // Add fixed milestones
    fixedMilestones.forEach(milestone => {
      const day = milestone.day || 15;
      if (shouldIncludeEvent(milestone.grade, milestone.month, day)) {
        newEvents.push(createEvent(
          createDateForGrade(milestone.grade, milestone.month, day),
          milestone.title,
          milestone.category,
          milestone.notes || '',
          true,
          ['fixed-milestone']
        ));
      }
    });

    // Add curriculum-specific milestones
    if (formData.curriculum === 'ap') {
      // Add AP Exams in May for grades 9-11 (exclude senior year)
      [9, 10, 11].forEach(grade => {
        if (grade >= startGrade && grade < 12) {
          const apExamDate = createDateForGrade(grade, 4, 1); // May 1st
          if (parseLocalDate(apExamDate) >= startDate) {
            newEvents.push(createEvent(
              apExamDate,
              'AP Exams',
              'Testing',
              'Advanced Placement exams (typically first two weeks of May)',
              false,
              ['curriculum']
            ));
          }
        }
      });
    } else if (formData.curriculum === 'ib') {
      // Add IB Predicted Grades review in October of senior year
      const ibGradesDate = createDateForGrade(12, 9, 15); // October 15th of senior year
      if (startGrade <= 12 && parseLocalDate(ibGradesDate) >= startDate) {
        newEvents.push(createEvent(
          ibGradesDate,
          'Review IB Predicted Grades',
          'Milestone',
          'Review predicted IB Diploma grades with counselor',
          false,
          ['curriculum']
        ));
      }
    }

    // Add cadence-based check-ins
    if (formData.cadence === 'high-touch') {
      // 9th-10th grade: every 8 weeks
      [9, 10].forEach(grade => {
        if (grade >= startGrade) {
          const gradeStartDate = createDateForGrade(grade, 8, 1);
          for (let weeks = 8; weeks < 52; weeks += 8) {
            const checkInDate = new Date(gradeStartDate);
            checkInDate.setDate(checkInDate.getDate() + (weeks * 7));
            const dateStr = checkInDate.toISOString().split('T')[0];
            
            // Don't add if too close to a fixed milestone
            const tooClose = newEvents.some(e => {
              const diff = Math.abs(parseLocalDate(e.date) - parseLocalDate(dateStr)) / (1000 * 60 * 60 * 24);
              return diff < 14;
            });
            
            if (!tooClose && checkInDate >= startDate) {
              const inAppSeason = isApplicationSeason(dateStr);
              newEvents.push(createEvent(
                dateStr,
                'Consulting Check-in',
                'Check-in',
                inAppSeason ? 'Application Season Support' : 'Regular progress check',
                false,
                ['cadence-checkin']
              ));
            }
          }
        }
      });

      // 11th grade: every 6 weeks
      if (startGrade <= 11) {
        const gradeStartDate = createDateForGrade(11, 8, 1);
        for (let weeks = 6; weeks < 52; weeks += 6) {
          const checkInDate = new Date(gradeStartDate);
          checkInDate.setDate(checkInDate.getDate() + (weeks * 7));
          const dateStr = checkInDate.toISOString().split('T')[0];
          
          const tooClose = newEvents.some(e => {
            const diff = Math.abs(parseLocalDate(e.date) - parseLocalDate(dateStr)) / (1000 * 60 * 60 * 24);
            return diff < 14;
          });
          
          if (!tooClose && checkInDate >= startDate) {
            const inAppSeason = isApplicationSeason(dateStr);
            newEvents.push(createEvent(
              dateStr,
              'Consulting Check-in',
              'Check-in',
              inAppSeason ? 'Application Season Support' : 'Regular progress check',
              false,
              ['cadence-checkin']
            ));
          }
        }
      }

      // 12th grade: every 2-3 weeks (Sep-Nov)
      if (startGrade <= 12) {
        const seniorYear = getSchoolYear(formData.startDate, '12');
        const sepStart = new Date(`${seniorYear}-09-01`);
        const novEnd = new Date(`${seniorYear}-11-15`);
        
        let weekCounter = 2;
        while (sepStart.getTime() + (weekCounter * 7 * 24 * 60 * 60 * 1000) <= novEnd.getTime()) {
          const checkInDate = new Date(sepStart.getTime() + (weekCounter * 7 * 24 * 60 * 60 * 1000));
          
          if (checkInDate <= novEnd) {
            const dateStr = checkInDate.toISOString().split('T')[0];
            const tooClose = newEvents.some(e => {
              const diff = Math.abs(parseLocalDate(e.date) - parseLocalDate(dateStr)) / (1000 * 60 * 60 * 24);
              return diff < 10;
            });
            
            if (!tooClose && checkInDate >= startDate) {
              newEvents.push(createEvent(
                dateStr,
                'Senior Fall Check-in',
                'Check-in',
                'Application season support',
                false,
                ['senior-intensive']
              ));
            }
          }
          weekCounter += 2.5;
        }
      }
    }

    // Test prep and assessment
    // Assessment can happen regardless of provider (City Smarts or Undecided)
    // BUT not for 12th graders - it's too late
    if ((formData.testPrepProvider === 'city-smarts' || formData.testPrepProvider === 'undecided') && formData.assessmentNeeded && startGrade < 12) {
      let assessmentDate;
      
      if (formData.assessmentTiming === 'asap') {
        // Schedule 2 weeks from start date
        const asapDate = new Date(formData.startDate);
        asapDate.setDate(asapDate.getDate() + 14);
        assessmentDate = `${asapDate.getFullYear()}-${String(asapDate.getMonth() + 1).padStart(2, '0')}-${String(asapDate.getDate()).padStart(2, '0')}`;
      } else if (formData.assessmentTiming === 'spring_10th') {
        assessmentDate = createDateForGrade(10, 3, 15);
      } else if (formData.assessmentTiming === 'summer_after_10th') {
        assessmentDate = createDateForGrade(10, 6, 15);
      } else if (formData.assessmentTiming === 'fall_11th') {
        assessmentDate = createDateForGrade(11, 9, 15);
      } else if (formData.assessmentTiming === 'spring_11th') {
        assessmentDate = createDateForGrade(11, 3, 15);
      }
      
      if (assessmentDate && parseLocalDate(assessmentDate) >= startDate) {
        newEvents.push(createEvent(
          assessmentDate,
          'Practice SAT & ACT Assessment',
          'Testing',
          'Complete diagnostic testing at City Smarts classroom',
          false,
          ['assessment']
        ));
        
        // Add planning call 1 week after assessment
        const planCallDate = parseLocalDate(assessmentDate);
        planCallDate.setDate(planCallDate.getDate() + 7);
        const planCallDateStr = `${planCallDate.getFullYear()}-${String(planCallDate.getMonth() + 1).padStart(2, '0')}-${String(planCallDate.getDate()).padStart(2, '0')}`;
        newEvents.push(createEvent(
          planCallDateStr,
          'Test Planning Call',
          'Testing',
          'Review assessment results and create test prep plan',
          false,
          ['assessment']
        ));
      }

      // Only add "Begin test prep" if provider is City Smarts (not undecided)
      if (formData.testPrepProvider === 'city-smarts' && formData.selectedTestDates.length > 0) {
        const firstTestDate = formData.selectedTestDates.sort()[0];
        
        // Calculate 4 months before first test
        const fourMonthsBeforeTest = parseLocalDate(firstTestDate);
        fourMonthsBeforeTest.setMonth(fourMonthsBeforeTest.getMonth() - 4);
        
        // Use the later of: 4 months before test OR right after assessment
        let prepStartDate;
        if (assessmentDate) {
          const afterAssessment = parseLocalDate(assessmentDate);
          afterAssessment.setDate(afterAssessment.getDate() + 21); // 3 weeks after assessment
          prepStartDate = afterAssessment > fourMonthsBeforeTest ? afterAssessment : fourMonthsBeforeTest;
        } else {
          prepStartDate = fourMonthsBeforeTest;
        }
        
        if (prepStartDate >= startDate) {
          const prepDateStr = `${prepStartDate.getFullYear()}-${String(prepStartDate.getMonth() + 1).padStart(2, '0')}-${String(prepStartDate.getDate()).padStart(2, '0')}`;
          newEvents.push(createEvent(
            prepDateStr,
            'Begin Test Prep',
            'Testing',
            'Start regular test preparation sessions',
            false,
            ['test-prep']
          ));
        }
      }
    }

    // If test prep provider is undecided, add a meeting to discuss
    // Only for students in 10th grade or earlier
    if (formData.testPrepProvider === 'undecided' && startGrade <= 10) {
      const discussDate = createDateForGrade(10, 2, 1); // March of 10th grade
      if (parseLocalDate(discussDate) >= startDate) {
        newEvents.push(createEvent(
          discussDate,
          'Discuss Test Prep Options',
          'Testing',
          'Review test prep providers and create testing strategy',
          false,
          ['test-prep']
        ));
      }
    }

    // Add selected test dates with specific test type
    formData.selectedTestDates.forEach(dateStr => {
      const testDate = SAT_DATES.find(d => d.date === dateStr) || ACT_DATES.find(d => d.date === dateStr);
      if (testDate) {
        // Determine test type
        let testType = '';
        if (formData.testing_plan === 'sat') {
          testType = 'SAT';
        } else if (formData.testing_plan === 'act') {
          testType = 'ACT';
        } else if (formData.testing_plan === 'both') {
          // If both, check which list the date is from
          testType = SAT_DATES.find(d => d.date === dateStr) ? 'SAT' : 'ACT';
        }
        
        newEvents.push(createEvent(
          dateStr,
          `${testType} - ${testDate.label}`,
          'Testing',
          testDate.registration_deadline ? `Registration deadline: ${parseLocalDate(testDate.registration_deadline).toLocaleDateString()}` : '',
          true,
          ['test-date']
        ));
      }
    });

    // Essay support
    if (formData.essaySupport) {
      // June before senior year (end of junior year)
      const essayStartDate = createDateForGrade(11, 5, 15); 
      if (parseLocalDate(essayStartDate) >= startDate) {
        newEvents.push(createEvent(
          essayStartDate,
          'Begin Essay Work',
          'Essay',
          'Start personal statement brainstorming and drafting',
          false,
          ['essay']
        ));
      }
      
      // August 1st of the summer BEFORE senior year starts
      const seniorYear = getSchoolYear(formData.startDate, '12');
      const suppStartDate = `${seniorYear}-08-01`;
      if (parseLocalDate(suppStartDate) >= startDate) {
        newEvents.push(createEvent(
          suppStartDate,
          'Begin Supplemental Essays',
          'Essay',
          'Start working on school-specific essays',
          false,
          ['essay']
        ));
      }
    }

    // Application system milestones
    const seniorYear = getSchoolYear(formData.startDate, '12');
    
    // Helper to create deadline dates in local timezone without UTC conversion
    // Month parameter should be 1-12 (normal calendar months)
    const createDeadlineDate = (year, month, day) => {
      const y = year.toString();
      const m = month.toString().padStart(2, '0');
      const d = day.toString().padStart(2, '0');
      return `${y}-${m}-${d}`;
    };
    
    if (formData.applicationSystems.common_app) {
      newEvents.push(createEvent(
        createDeadlineDate(seniorYear, 8, 1),
        'Common App Opens',
        'Application',
        'Common Application becomes available',
        true,
        ['deadline']
      ));
    }

    if (formData.applicationSystems.uc_system) {
      newEvents.push(createEvent(
        createDeadlineDate(seniorYear, 11, 1),
        'UC Filing Opens',
        'Application',
        'University of California application filing period begins',
        true,
        ['deadline']
      ));
      newEvents.push(createEvent(
        createDeadlineDate(seniorYear, 11, 29),
        'UC Filing Deadline',
        'Application',
        'Final deadline for UC applications',
        true,
        ['deadline']
      ));
    }

    // US Application Deadlines
    if (formData.applicationSystems.common_app) {
      newEvents.push(createEvent(
        createDeadlineDate(seniorYear, 10, 15),
        'Southern Early Action Deadline',
        'Application',
        'Early Action deadline for Georgia, Texas, UNC, Clemson, etc.',
        true,
        ['deadline']
      ));
      newEvents.push(createEvent(
        createDeadlineDate(seniorYear, 11, 1),
        'Early Action/Early Decision Deadline',
        'Application',
        'Most common EA/ED deadline',
        true,
        ['deadline']
      ));
      newEvents.push(createEvent(
        createDeadlineDate(seniorYear + 1, 1, 1),
        'Regular Decision & ED2 Deadline',
        'Application',
        'Regular Decision and Early Decision 2 deadline',
        true,
        ['deadline']
      ));
    }

    // Canadian Application Deadlines
    if (formData.applicationSystems.canada) {
      newEvents.push(createEvent(
        createDeadlineDate(seniorYear, 10, 15),
        'Canadian Applications Open',
        'Application',
        'Most Canadian university applications open for submission',
        true,
        ['deadline']
      ));
      newEvents.push(createEvent(
        createDeadlineDate(seniorYear + 1, 1, 15),
        'Canadian University Deadlines',
        'Application',
        'Typical deadline for Canadian universities (varies by school)',
        false,
        ['deadline']
      ));
    }

    // UK Application Deadlines
    if (formData.applicationSystems.ucas) {
      newEvents.push(createEvent(
        createDeadlineDate(seniorYear + 1, 1, 29),
        'UCAS Equal Consideration Deadline',
        'Application',
        'UK universities equal consideration deadline',
        true,
        ['deadline']
      ));
    }

    if (formData.applicationSystems.oxbridge) {
      // Register for Oxbridge Admissions Tests (August, summer before senior year)
      const juniorYear = getSchoolYear(formData.startDate, '11');
      newEvents.push(createEvent(
        createDeadlineDate(juniorYear, 7, 15),
        'Register for Oxbridge Admissions Tests',
        'Testing',
        'Register for ESAT, TMUA, or TARA by late September',
        false,
        ['oxbridge']
      ));
      
      // Oxbridge Application Deadline (October 15)
      newEvents.push(createEvent(
        createDeadlineDate(seniorYear, 10, 15),
        'Oxbridge Application Deadline',
        'Application',
        'Oxford and Cambridge UCAS application deadline (6pm UK time)',
        true,
        ['deadline']
      ));
      
      // Submit Written Work (November 10)
      newEvents.push(createEvent(
        createDeadlineDate(seniorYear, 11, 10),
        'Submit Oxbridge Written Work',
        'Application',
        'Submit required essays to your college (if applicable to your course)',
        false,
        ['oxbridge']
      ));
      
      // Oxbridge Interviews (December)
      newEvents.push(createEvent(
        createDeadlineDate(seniorYear, 11, 15),
        'Oxbridge Interviews',
        'Application',
        'Interview invitations sent; interviews typically held in December',
        false,
        ['oxbridge']
      ));
      
      // Oxbridge Decision Day (January 13)
      newEvents.push(createEvent(
        createDeadlineDate(seniorYear + 1, 1, 13),
        'Oxbridge Decision Day',
        'Deadline',
        'Oxford and Cambridge release admissions decisions',
        true,
        ['oxbridge']
      ));
    }

    // Financial aid
    if (formData.applicationSystems.common_app || formData.applicationSystems.uc_system) {
      newEvents.push(createEvent(
        createDeadlineDate(seniorYear, 10, 1),
        'FAFSA Opens',
        'Financial Aid',
        'Free Application for Federal Student Aid becomes available',
        true,
        ['deadline']
      ));
      newEvents.push(createEvent(
        createDeadlineDate(seniorYear, 10, 1),
        'CSS Profile Opens',
        'Financial Aid',
        'CSS Profile for institutional aid becomes available',
        true,
        ['deadline']
      ));
    }

    // Filter out any events that are before the start date and sort
    const filteredEvents = newEvents.filter(event => parseLocalDate(event.date) >= startDate);
    setEvents(filteredEvents.sort((a, b) => parseLocalDate(a.date) - parseLocalDate(b.date)));
    console.log('Timeline generation complete. Total events:', filteredEvents.length);
  };

  const deleteEvent = (id) => {
    setEvents(events.filter(e => e.id !== id));
  };

  const startEditingEvent = (event) => {
    setEditingEvent({ ...event });

  const saveEditedEvent = () => {

      setEvents([...events, newEvent].sort((a, b) => parseLocalDate(a.date) - parseLocalDate(b.date)));
      setCustomEvent({ date: '', title: '', category: 'Custom', notes: '' });
      setShowCustomEventForm(false);
    }
  };

  const exportToCSV = () => {
    const headers = ['Date', 'Event', 'Category', 'Notes', 'Fixed'];
    const rows = events.map(e => [
      parseLocalDate(e.date).toLocaleDateString(),
      e.title,
      e.category,
      e.notes || '',
      e.fixed ? 'Yes' : 'No'
    ]);
    
    const csv = [headers, ...rows].map(row => row.map(cell => `"${cell}"`).join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const filename = formData.studentName ? `${formData.studentName.replace(/\s+/g, '_')}_timeline.csv` : 'timeline.csv';
    a.href = url;
    a.download = filename;
    a.click();
  };

  const exportToICS = () => {
    const icsEvents = events.map(e => {
      const date = parseLocalDate(e.date);
      // Format date as YYYYMMDD for ICS (all-day event)
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      const dateStr = `${year}${month}${day}`;
      
      return `BEGIN:VEVENT
UID:${e.id}@citysmarts.net
DTSTAMP:${dateStr}T120000Z
DTSTART;VALUE=DATE:${dateStr}
SUMMARY:${e.title}
DESCRIPTION:${e.notes || e.category}
CATEGORIES:${e.category}
END:VEVENT`;
    }).join('\n');

    const ics = `BEGIN:VCALENDAR
VERSION:2.0
PRODID:-//City Smarts//Timeline Generator//EN
CALSCALE:GREGORIAN
METHOD:PUBLISH
${icsEvents}
END:VCALENDAR`;

    const blob = new Blob([ics], { type: 'text/calendar' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const filename = formData.studentName ? `${formData.studentName.replace(/\s+/g, '_')}_timeline.ics` : 'timeline.ics';

                          }}
                          onMouseOver={(e) => {
                            e.currentTarget.style.boxShadow = '0 2px 6px rgba(255,199,64,0.2)';
                          }}
                          onMouseOut={(e) => {
                            e.currentTarget.style.boxShadow = 'none';
                          }}
                        >
                          {editingEvent && editingEvent.id === event.id ? (
                            <div style={{ display: 'flex', flexDirection: 'column', gap: '0.75rem' }}>
                              <div style={{ display: 'flex', gap: '1rem', alignItems: 'center' }}>
                                <input
                                  type="date"
                                  value={editingEvent.date}
                                  onChange={(e) => setEditingEvent({ ...editingEvent, date: e.target.value })}
                                  style={{ padding: '0.5rem', border: '2px solid #dee2e6', borderRadius: '4px', fontFamily: '"Lora", serif' }}
                                />
                                <input
                                  type="text"
                                  value={editingEvent.title}
                                  onChange={(e) => setEditingEvent({ ...editingEvent, title: e.target.value })}
                                  style={{ flex: 1, padding: '0.5rem', border: '2px solid #dee2e6', borderRadius: '4px', fontFamily: '"Lora", serif' }}
                                />
                              </div>
                              <input
                                type="text"
                                value={editingEvent.notes}
                                onChange={(e) => setEditingEvent({ ...editingEvent, notes: e.target.value })}
                                placeholder="Notes"
                                style={{ padding: '0.5rem', border: '2px solid #dee2e6', borderRadius: '4px', fontFamily: '"Lora", serif' }}
                              />
                              <div style={{ display: 'flex', gap: '0.5rem' }}>
                                <button
                                  onClick={saveEditedEvent}
                                  style={{
                                    padding: '0.5rem 1rem',
                                    background: '#28a745',
                                    color: 'white',
                                    border: 'none',
                                    borderRadius: '4px',
                                    cursor: 'pointer',
                                    display: 'flex',
                                    alignItems: 'center',
                                    gap: '0.25rem'
                                  }}
                                >
                                  <Check size={16} /> Save
                                </button>
                                <button
                                  onClick={() => setEditingEvent(null)}
                                  style={{
                                    padding: '0.5rem 1rem',
                                    background: '#6c757d',
                                    color: 'white',
                                    border: 'none',
                                    borderRadius: '4px',
                                    cursor: 'pointer',
                                    display: 'flex',
                                    alignItems: 'center',
                                    gap: '0.25rem'
                                  }}
                                >
                                  <X size={16} /> Cancel
                                </button>
                              </div>
                            </div>
                          ) : (
                            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: '1rem' }}>
                              <div style={{ flex: 1, display: 'flex', alignItems: 'center', gap: '0.75rem' }}>
                                <span style={{
                                  fontSize: '0.8rem',
                                  color: '#666',
                                  fontWeight: '500',
                                  fontFamily: '"Lato", sans-serif',
                                  minWidth: '80px'
                                }}>
                                  {parseLocalDate(event.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}
                                </span>
                                <span style={{
                                  padding: '0.2rem 0.6rem',
                                  background: 'rgba(255,199,64,0.15)',
                                  borderRadius: '3px',
                                  fontSize: '0.75rem',
                                  fontWeight: '600',
                                  color: '#212121',
                                  fontFamily: '"Lato", sans-serif',
                                  textTransform: 'uppercase',
                                  letterSpacing: '0.5px'
                                }}>
                                  {event.category}
                                </span>
                                <div style={{
                                  fontSize: '0.95rem',
                                  fontWeight: '500',
                                  color: '#2c3e50',
                                  fontFamily: '"Lato", sans-serif',
                                  flex: 1
                                }}>
                                  {event.title}
                                  {event.notes && (
                                    <span style={{
                                      fontSize: '0.85rem',
                                      color: '#666',
                                      fontWeight: '400',
                                      marginLeft: '0.5rem',
                                      fontStyle: 'italic'
                                    }}>
                                      — {event.notes}
                                    </span>
                                  )}
                                </div>
                              </div>
                              <div style={{ display: 'flex', gap: '0.25rem' }}>
                                <button
                                  onClick={() => startEditingEvent(event)}
                                  style={{
                                    padding: '0.4rem',
                                    background: '#ffc740',
                                    color: '#212121',
                                    border: 'none',
                                    borderRadius: '3px',
                                    cursor: 'pointer',
                                    display: 'flex',
                                    alignItems: 'center'
                                  }}
                                  title="Edit event"
                                >
                                  <Edit2 size={14} />
                                </button>
                                <button
                                  onClick={() => deleteEvent(event.id)}
                                  style={{
                                    padding: '0.4rem',
                                    background: '#dc3545',
                                    color: 'white',
                                    border: 'none',
                                    borderRadius: '3px',
                                    cursor: 'pointer',
                                    display: 'flex',
                                    alignItems: 'center'
                                  }}
                                  title="Delete event"
                                >
                                  <Trash2 size={14} />
                                </button>
                              </div>
                            </div>
                          )}
                        </div>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            </div>

            <div style={{
              background: 'white',
              borderRadius: '12px',
              padding: '2rem',
              boxShadow: '0 2px 15px rgba(0,0,0,0.08)',
              textAlign: 'center'
            }}>
              <p style={{
                margin: 0,
                color: '#6c757d',
                fontFamily: '"Lora", serif',
                fontSize: '1rem'
              }}>
                Total Events: <strong>{events.length}</strong> • 
                You can edit dates and details by clicking the edit button on any event.
              </p>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

        
        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TimelineGenerator />);
    </script>
</body>
</html>
